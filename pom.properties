<%@page contentType="text/html" pageEncoding="UTF-8"%>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login | SkyManager</title>

    <!-- ========================================= -->
    <!-- GOOGLE FONTS -->
    <!-- ========================================= -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ========================================= -->
    <!-- BOOTSTRAP -->
    <!-- ========================================= -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ========================================= -->
    <!-- ICONOS -->
    <!-- ========================================= -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- ========================================= -->
    <!-- ESTILOS -->
    <!-- ========================================= -->

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            font-family:'Poppins',sans-serif;

            background:
                radial-gradient(circle at top left,
                rgba(212,175,55,0.12),
                transparent 30%),

                radial-gradient(circle at bottom right,
                rgba(212,175,55,0.08),
                transparent 30%),

                #050505;

            color:white;
        }

        /* =========================================
           FONDO ANIMADO
        ========================================= */

        .background{

            position:absolute;

            width:100%;
            height:100%;

            overflow:hidden;

            z-index:-1;
        }

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(212,175,55,0.06);

            filter:blur(2px);

            animation:float 10s infinite ease-in-out;
        }

        .circle:nth-child(1){

            width:350px;
            height:350px;

            top:-100px;
            left:-100px;
        }

        .circle:nth-child(2){

            width:450px;
            height:450px;

            bottom:-150px;
            right:-150px;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-25px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* =========================================
           LOGIN CARD
        ========================================= */

        .login-card{

            width:430px;

            padding:45px;

            border-radius:28px;

            background:rgba(255,255,255,0.04);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 15px 40px rgba(0,0,0,0.45);

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* =========================================
           LOGO
        ========================================= */

        .logo-area{

            text-align:center;

            margin-bottom:30px;
        }

        .logo-circle{

            width:100px;
            height:100px;

            margin:auto;

            border-radius:50%;

            background:linear-gradient(
                    135deg,
                    #d4af37,
                    #f5d76e
            );

            display:flex;

            justify-content:center;

            align-items:center;

            margin-bottom:18px;

            box-shadow:
                0 10px 30px rgba(212,175,55,0.35);
        }

        .logo-circle i{

            font-size:45px;

            color:#111111;
        }

        .logo-title{

            font-size:30px;

            font-weight:700;

            letter-spacing:1px;

            color:#ffffff;
        }

        .logo-subtitle{

            color:#9ca3af;

            font-size:13px;

            letter-spacing:2px;
        }

        /* =========================================
           LABELS
        ========================================= */

        .form-label{

            color:#e5e7eb;

            margin-bottom:10px;

            font-weight:500;
        }

        /* =========================================
           INPUTS
        ========================================= */

        .form-control{

            height:55px;

            border-radius:16px;

            background:#0f0f0f;

            border:1px solid #2a2a2a;

            color:white;

            padding-left:18px;
        }

        .form-control::placeholder{

            color:#777777;
        }

        .form-control:focus{

            background:#111111;

            color:white;

            border-color:#d4af37;

            box-shadow:
                0 0 0 0.2rem rgba(212,175,55,0.15);
        }

        /* =========================================
           INPUT GROUP
        ========================================= */

        .input-group-text{

            background:#0f0f0f;

            border:1px solid #2a2a2a;

            color:#d4af37;

            border-left:none;

            border-radius:0 16px 16px 0;

            cursor:pointer;
        }

        /* =========================================
           BOTÓN LOGIN
        ========================================= */

        .btn-login{

            width:100%;

            height:55px;

            border:none;

            border-radius:16px;

            background:linear-gradient(
                    135deg,
                    #d4af37,
                    #f5d76e
            );

            color:#111111;

            font-weight:700;

            font-size:16px;

            transition:0.3s;
        }

        .btn-login:hover{

            transform:translateY(-3px);

            box-shadow:
                0 10px 25px rgba(212,175,55,0.35);
        }

        /* =========================================
           ERROR
        ========================================= */

        .error{

            margin-top:20px;

            text-align:center;

            background:rgba(239,68,68,0.12);

            border:1px solid rgba(239,68,68,0.3);

            color:#fca5a5;

            padding:12px;

            border-radius:12px;

            font-weight:500;
        }

        /* =========================================
           FOOTER
        ========================================= */

        .footer-text{

            text-align:center;

            margin-top:25px;

            color:#777777;

            font-size:13px;
        }

        /* =========================================
           RESPONSIVE
        ========================================= */

        @media(max-width:500px){

            .login-card{

                width:92%;

                padding:30px;
            }

            .logo-title{

                font-size:24px;
            }
        }

    </style>

</head>

<body>

<!-- ========================================= -->
<!-- FONDO -->
<!-- ========================================= -->

<div class="background">

    <div class="circle"></div>

    <div class="circle"></div>

</div>

<!-- ========================================= -->
<!-- LOGIN CARD -->
<!-- ========================================= -->

<div class="login-card">

    <!-- ========================================= -->
    <!-- LOGO -->
    <!-- ========================================= -->

    <div class="logo-area">

        <!--
            PARA USAR TU LOGO:

            Reemplaza el div logo-circle por:

            <img src="assets/logo.png"
                 width="110">

            PNG recomendado.
        -->

        <div class="logo-circle">

            <i class="bi bi-airplane-fill"></i>

        </div>

        <div class="logo-title">

            SkyManager

        </div>

        <div class="logo-subtitle">

            PREMIUM FLIGHT SYSTEM

        </div>

    </div>

    <!-- ========================================= -->
    <!-- FORMULARIO -->
    <!-- ========================================= -->

    <form action="<%= request.getContextPath() %>/LoginServlet"
          method="POST">

        <!-- USUARIO -->

        <div class="mb-4">

            <label class="form-label">

                Usuario

            </label>

            <input type="text"
                   name="usuario"
                   class="form-control"
                   placeholder="Ingrese su usuario"
                   required>

        </div>

        <!-- PASSWORD -->

        <div class="mb-4">

            <label class="form-label">

                Contraseña

            </label>

            <div class="input-group">

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Ingrese su contraseña"
                       required>

                <span class="input-group-text"
                      onclick="togglePassword()">

                    <i class="bi bi-eye-fill"></i>

                </span>

            </div>

        </div>

        <!-- BOTÓN -->

        <button type="submit"
                class="btn-login">

            <i class="bi bi-box-arrow-in-right"></i>

            Ingresar al Sistema

        </button>

        <!-- ERROR -->

        <%
            String error =
                    (String) request.getAttribute("error");

            if(error != null){
        %>

            <div class="error">

                <i class="bi bi-exclamation-triangle-fill"></i>

                <%= error %>

            </div>

        <% } %>

    </form>

    <!-- FOOTER -->

    <div class="footer-text">

        © 2026 SkyManager · Sistema Premium

    </div>

</div>

<!-- ========================================= -->
<!-- SCRIPT -->
<!-- ========================================= -->

<script>

    function togglePassword(){

        let password =
                document.getElementById("password");

        if(password.type === "password"){

            password.type = "text";

        }else{

            password.type = "password";
        }
    }

</script>

</body>
</html>